# ===============================
# AMBIENTE PRODUCCION (main)
# ===============================
# Se inyectan las variables desde Cloud Run (Producción)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Optimizacion de Conexiones (HikariCP para Cloud Run)
# Un pool pequeño permite que Cloud Run escale a muchas instancias sin tirar la DB.
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# Almacenamiento
cloudflare.r2.bucket-name=${R2_BUCKET:meyi-imagenes}

# Logs (Evitar verbosidad en prod para ahorrar CPU/I/O)
logging.level.root=INFO
logging.level.org.hibernate.SQL=ERROR
logging.level.com.meyisoft.dental.system=INFO
