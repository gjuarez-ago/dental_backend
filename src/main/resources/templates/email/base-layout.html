<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{TITULO_EMAIL}}</title>
    <!--[if mso]>
    <style type="text/css">
        table {border-collapse: collapse;}
        .fallback-font {font-family: Arial, sans-serif;}
    </style>
    <![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#f4f6f9;font-family:Arial,'Helvetica Neue',Helvetica,sans-serif;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">

<!-- Wrapper principal -->
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#f4f6f9;">
    <tr>
        <td align="center" style="padding:24px 16px;">

            <!-- Contenedor del email (max 580px) -->
            <table role="presentation" width="580" cellspacing="0" cellpadding="0" border="0" style="max-width:580px;width:100%;background-color:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);">

                <!-- ========== HEADER ========== -->
                <tr>
                    <td style="background:linear-gradient(135deg,#0f766e,#0d9488);padding:28px 32px;text-align:center;">
                        <!-- Icono de diente (emoji universal) + nombre -->
                        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                            <tr>
                                <td align="center" style="font-size:32px;padding-bottom:8px;">🦷</td>
                            </tr>
                            <tr>
                                <td align="center" style="font-size:22px;font-weight:700;color:#ffffff;letter-spacing:0.5px;">
                                    {{NOMBRE_CLINICA}}
                                </td>
                            </tr>
                            <tr>
                                <td align="center" style="font-size:13px;color:#ccfbf1;padding-top:4px;">
                                    {{SUBTITULO_HEADER}}
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>

                <!-- ========== CUERPO ========== -->
                <tr>
                    <td style="padding:32px 32px 16px 32px;">
                        <!-- Saludo -->
                        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                            <tr>
                                <td style="font-size:18px;font-weight:700;color:#1e293b;padding-bottom:8px;">
                                    {{SALUDO}}
                                </td>
                            </tr>
                            <tr>
                                <td style="font-size:14px;color:#64748b;line-height:22px;padding-bottom:24px;">
                                    {{MENSAJE_INTRO}}
                                </td>
                            </tr>
                        </table>

                        <!-- Tarjeta de información -->
                        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#f0fdfa;border:1px solid #ccfbf1;border-radius:8px;">
                            <tr>
                                <td style="padding:20px 24px;">
                                    {{CONTENIDO_PRINCIPAL}}
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>

                <!-- ========== NOTA / CTA (opcional) ========== -->
                <tr>
                    <td style="padding:0 32px 32px 32px;">
                        {{SECCION_EXTRA}}
                    </td>
                </tr>

                <!-- FOOTER -->
                <tr>
                    <td style="background-color:#f8fafc;padding:24px 32px;border-top:1px solid #e2e8f0;">
                        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                            <tr>
                                <td align="center" style="font-size:13px;color:#475569;line-height:20px;font-weight:600;padding-bottom:8px;">
                                    {{NOMBRE_CLINICA}}
                                </td>
                            </tr>
                            <tr>
                                <td align="center" style="font-size:12px;color:#64748b;line-height:18px;">
                                    📞 Teléfono de atención: <strong>{{TELEFONO_CLINICA}}</strong><br>
                                    🌐 <a href="{{SITIO_WEB}}" style="color:#0ea5e9;text-decoration:none;">{{SITIO_WEB}}</a>
                                </td>
                            </tr>
                            <tr><td align="center" style="font-size:11px;color:#cbd5e1;padding-top:16px;">Este correo fue enviado automáticamente. Por favor no responda a este mensaje.</td></tr>
                        </table>
                    </td>
                </tr>

            </table>
            <!-- Fin contenedor -->

        </td>
    </tr>
</table>
<!-- Fin wrapper -->

</body>
</html>
