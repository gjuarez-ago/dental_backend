# ===============================
# AMBIENTE PRODUCCION (main)
# ===============================
# Se inyectan las variables desde Cloud Run (Producción)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ===============================
# HIBERNATE BATCH - REDUCE QUERIES
# ===============================
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Optimizacion de Conexiones (HikariCP para Cloud Run)
# Aumentado para manejar 10,000 usuarios/día sin congestión
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# Almacenamiento
cloudflare.r2.bucket-name=${R2_BUCKET:meyi-imagenes}

# Logs (Evitar verbosidad en prod para ahorrar CPU/I/O)
logging.level.root=INFO
logging.level.org.hibernate.SQL=ERROR
logging.level.com.meyisoft.dental.system=INFO
