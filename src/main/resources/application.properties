# ==========================================
# CONFIGURACIÓN BASE MÍNIMA
# ==========================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:desarrollo}
spring.application.name=crm

# Servidor
server.port=${PORT:8084}

# Driver común (solo la referencia, no la configuración completa)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Jackson (configuración común)
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false
spring.jackson.serialization.write-dates-as-timestamps=false

# Multipart (común)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Frontend (común)
app.frontend.url=${FRONTEND_URL:http://localhost:4200}

# JWT
jwt.secret=${JWT_SECRET:Y2xhdmVfcG9jaGlfbW92aWxfc2VjcmV0XzI1Nl9iaXRzX3NlZ3VyYQ==}
jwt.expiration=${JWT_EXPIRATION:300000}

# Mail (required so JavaMailSender bean can be auto-configured)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

# WhatsApp
whatsapp.api-url=${WHATSAPP_API_URL:https://graph.facebook.com/v20.0}
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN:dev-verify-token}
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:dev-access-token}
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:000000000000000}
