spring.profiles.active=${SPRING_PROFILES_ACTIVE:desarrollo}
spring.application.name=crm
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false
spring.jackson.serialization.write-dates-as-timestamps=false

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=${JWT_SECRET:Y2xhdmVfcG9jaGlfbW92aWxfc2VjcmV0XzI1Nl9iaXRzX3NlZ3VyYQ==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Las configuraciones de BD y JPA se movieron a application-desarrollo.properties, application-qa.properties y application-prod.properties
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Servidor
server.port=${PORT:8080}

# ===============================
# INTEGRACIONES (Opcionales)
# ===============================
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN}
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN}
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID}
whatsapp.api-url=${WHATSAPP_API_URL:https://graph.facebook.com/v22.0}

openai.api.key=${OPENAI_API_KEY}
openai.model=${OPENAI_MODEL:gpt-4o-mini}

cloudflare.r2.endpoint=${R2_ENDPOINT}
cloudflare.r2.access-key-id=${R2_ACCESS_KEY}
cloudflare.r2.secret-access-key=${R2_SECRET_KEY}
cloudflare.r2.public-url=${R2_PUBLIC_URL}

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# MONITORING (Actuator for Cloud Run)
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true